kind: Deployment
apiVersion: apps/v1
metadata:
 name: app-deployment
 namespace: project1
spec:
 replicas: 2
 selector:
  matchLabels:
   app: my-app
 template:
  metadata:
   labels:
    app: my-app
  spec:
   containers:
   - name: my-container
     image: wiings09/test-image:v2
     ports:
     - containerPort: 80

