kind: Deployment
apiVersion: apps/v1
metadata:
  name: frontend-deployment
  namespace: Project2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: wiings09/passop-k8s-frontend:ip
        ports:
        - containerPort: 80