kind: Deployment
apiVersion: apps/v1
metadata:
  name: backend-deployment
  namespace: Project2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: wiings09/passop-k8s-backend:v1
        ports:
        - containerPort: 80
        envFrom:
        - secretRef:
            name: backend-secret